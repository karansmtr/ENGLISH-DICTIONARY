<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ENGLISH DICTIONARY</title>
    <link rel="stylesheet" href="style.css">nk
  </head>
  <body>
    <div class="container">
      <h1 class="heading">ENGLISH DICTIONARY</h1>
      <input
        type="text"
        placeholder="Search here..."
        id="input"
        class="input"
      />
      <p class="info-text" id="info-text">Type a word and enter.</p>
      <div class="meaning-container" id="meaning-continer">
        <p>WORD TITLE: <span class="title" id="title"> ___ </span></p>
        <p>MEANING: <span class="meaning" id="meaning"> ___ </span></p>
        <audio src="" controls id="audio"></audio>
      </div>
    </div>
  </body>
</html>
